<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PestShield | Portal Log In</title>
  <meta name="description"
    content="Access your PestShield customer dashboard to review service plans, chemical logs, invoice histories, and dispatcher dispatches.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Grid CSS (Bootstrap 5 Grid Only) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css">

  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <!-- Pre-load theme & direction preferences -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      const dir = localStorage.getItem('dir') || 'ltr';
      document.documentElement.setAttribute('dir', dir);
    })();
  </script>
</head>

<body>

  <div class="auth-split-container">
    <!-- Form Side -->
    <div class="auth-form-side">
      <div class="auth-form-wrapper">
        <div style="margin-bottom:30px; display:flex; flex-direction:column; align-items:center; text-align:center;">
          <a href="index.html" class="logo" style="margin-bottom:15px; justify-content:center;">
            <i data-lucide="shield-alert" class="logo-icon"></i>
            PestShield
          </a>
          <h1 style="font-size:1.5rem;margin-bottom:5px;">Welcome Back</h1>
          <p style="color:var(--text-secondary);font-size:0.875rem;">Access your commercial or residential portal.</p>
        </div>

        <form class="interactive-form">
          <div class="form-group-custom">
            <label class="form-label-custom" for="login-email">Portal Email</label>
            <input type="email" id="login-email" class="form-control-custom" placeholder="name@company.com" required>
          </div>

          <div class="form-group-custom">
            <div style="display:flex;justify-content:between;align-items:center;margin-bottom:8px;">
              <label class="form-label-custom" for="login-pass" style="margin-bottom:0;">Password</label>
              <a href="#" style="font-size:0.8rem;margin-left:auto;color:var(--color-accent);">Forgot Password?</a>
            </div>
            <input type="password" id="login-pass" class="form-control-custom" placeholder="••••••••" required>
          </div>

          <div style="margin-bottom:20px;display:flex;align-items:center;gap:8px;font-size:0.875rem;">
            <input type="checkbox" id="remember-me"
              style="accent-color:var(--color-accent);cursor:pointer;width:16px;height:16px;">
            <label for="remember-me" style="color:var(--text-secondary);cursor:pointer;">Remember me</label>
          </div>

          <button type="submit" class="btn-custom btn-custom-primary" style="width: 100%; justify-content: center;"><i data-lucide="log-in"></i> Log In to Portal</button>

          <div style="display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-secondary); font-size: 0.85rem;">
            <div style="flex: 1; border-bottom: 1px solid var(--color-border);"></div>
            <span style="padding: 0 10px;">or continue with</span>
            <div style="flex: 1; border-bottom: 1px solid var(--color-border);"></div>
          </div>

          <div style="display: flex; gap: 12px;">
            <button type="button" class="btn-custom btn-custom-secondary" style="flex: 1; justify-content: center; font-size: 0.9rem; padding: 10px 16px; border: 1px solid var(--color-border);">
              <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button type="button" class="btn-custom btn-custom-secondary" style="flex: 1; justify-content: center; font-size: 0.9rem; padding: 10px 16px; border: 1px solid var(--color-border);">
              <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M17.05 20.28c-.98.95-2.05 1.88-3.08 1.88-1.07 0-1.37-.62-2.6-.62-1.22 0-1.56.6-2.6.6-1.03 0-2.25-1.02-3.23-1.98C3.5 18.15 2 14.88 2 11.66c0-5.08 3.3-7.73 6.55-7.73 1.05 0 2 .62 2.65.62.65 0 1.7-.68 2.92-.68 1.28 0 2.44.47 3.23 1.34-3.4 2.02-2.83 6.64.42 8C17 15.65 15.65 18.9 17.05 20.28M12.03 3.25c.57-.7 1.33-1.63 1.2-2.6-.87.08-1.92.64-2.5 1.34-.58.7-1.13 1.66-1 2.6.98.08 1.95-.53 2.3-1.34z"/>
              </svg>
              Apple
            </button>
          </div>
        </form>

        <p style="margin-top:30px;font-size:0.875rem;color:var(--text-secondary);text-align:center;">
          Don't have an account? <a href="signup.html" style="color:var(--color-accent);font-weight: 500;">Request
            Access</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
