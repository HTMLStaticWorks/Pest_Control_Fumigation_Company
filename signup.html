<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PestShield | Create Customer Portal Account</title>
  <meta name="description" content="Register your residential property or commercial business account to monitor treatments, check dates, and access reports.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Grid CSS (Bootstrap 5 Grid Only) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <!-- Pre-load theme & direction preferences -->
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      const dir = localStorage.getItem('dir') || 'ltr';
      document.documentElement.setAttribute('dir', dir);
    })();
  </script>
</head>
<body>

  <!-- Top Right Utility Actions -->
  <div class="auth-actions">
    <button class="theme-toggle" aria-label="Toggle dark mode">
      <i data-lucide="moon" class="moon-icon" style="width:20px;height:20px;"></i>
      <i data-lucide="sun" class="sun-icon" style="width:20px;height:20px;"></i>
    </button>
    <button class="dir-toggle" aria-label="Toggle RTL layout">
      <span class="dir-text">RTL</span>
    </button>
  </div>

  <div class="auth-split-container">
    <!-- Form Side -->
    <div class="auth-form-side">
      <div class="auth-form-wrapper">
        <div style="margin-bottom:30px; display:flex; flex-direction:column; align-items:center; text-align:center;">
          <a href="index.html" class="logo" style="margin-bottom:15px; justify-content:center;">
            <i data-lucide="shield-alert" class="logo-icon"></i>
            PestShield
          </a>
          <h1 style="font-size:1.2rem;margin-bottom:5px;">Create Portal Account</h1>
          <p style="color:var(--text-secondary);font-size:0.875rem;">Register your property for continuous protection.</p>
        </div>

        <form class="interactive-form">
          <div class="form-group-custom">
            <label class="form-label-custom" for="reg-name">Full Name / Organization</label>
            <input type="text" id="reg-name" class="form-control-custom" placeholder="John Doe" required>
          </div>
          
          <div class="form-group-custom">
            <label class="form-label-custom" for="reg-email">Account Email</label>
            <input type="email" id="reg-email" class="form-control-custom" placeholder="name@email.com" required>
          </div>

          <div class="form-group-custom">
            <label class="form-label-custom" for="reg-phone">Contact Phone</label>
            <input type="tel" id="reg-phone" class="form-control-custom" placeholder="(555) 555-5555" required>
          </div>
          <div class="form-group-custom">
            <label class="form-label-custom" for="reg-type">Account Type</label>
            <select id="reg-type" class="form-control-custom" required>
              <option value="">Choose Category</option>
              <option value="residential">Residential Owner</option>
              <option value="commercial">Commercial Business</option>
              <option value="manager">Property Manager</option>
            </select>
          </div>

          <div class="form-group-custom">
            <label class="form-label-custom" for="reg-pass">Portal Password</label>
            <input type="password" id="reg-pass" class="form-control-custom" placeholder="••••••••" required>
          </div>

          <div style="margin-bottom:20px;display:flex;align-items:flex-start;gap:8px;font-size:0.85rem;">
            <input type="checkbox" id="reg-terms" style="accent-color:var(--color-accent);cursor:pointer;width:16px;height:16px;margin-top:2px;" required>
            <label for="reg-terms" style="color:var(--text-secondary);cursor:pointer;line-height:1.4;">I authorize PestShield to set up my access and agree to the <a href="#" style="color:var(--color-accent);">Terms of Compliance</a>.</label>
          </div>

          <button type="submit" class="btn-custom btn-custom-primary" style="width: 100%; justify-content: center;"><i data-lucide="user-plus"></i> Register Portal Account</button>

          <div style="display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-secondary); font-size: 0.85rem;">
            <div style="flex: 1; border-bottom: 1px solid var(--color-border);"></div>
            <span style="padding: 0 10px;">or continue with</span>
            <div style="flex: 1; border-bottom: 1px solid var(--color-border);"></div>
          </div>

          <div style="display: flex; gap: 12px;">
            <button type="button" class="btn-custom btn-custom-secondary" style="flex: 1; justify-content: center; font-size: 0.9rem; padding: 10px 16px; border: 1px solid var(--color-border);">
              <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button type="button" class="btn-custom btn-custom-secondary" style="flex: 1; justify-content: center; font-size: 0.9rem; padding: 10px 16px; border: 1px solid var(--color-border);">
              <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M17.05 20.28c-.98 1.15-2.01 2.31-3.21 2.33-1.18.02-1.56-.7-2.93-.7-1.37 0-1.82.72-2.96.69-1.18-.03-2.31-1.28-3.19-2.58C2.17 18.25.96 14.54 2.35 12.06c.69-1.23 2.16-2.02 3.75-2.02 1.31 0 2.51.9 3.3.9.79 0 2.31-1.12 3.9-1.12.67 0 2.52.07 3.78 1.89-3.32 2.05-2.88 5.7.53 7.57zM12.44 8.28c.78-1.02 1.31-2.45 1.16-3.87-1.12.05-2.48.75-3.29 1.73-.72.84-1.31 2.31-1.13 3.72 1.25.09 2.51-.62 3.26-1.58z"/>
              </svg>
              Apple
            </button>
          </div>
        </form>

        <p style="margin-top:30px;font-size:0.875rem;color:var(--text-secondary);text-align:center;">
          Already have an account? <a href="login.html" style="color:var(--color-accent);font-weight: 500;">Log In Here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
